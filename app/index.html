<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Simple PTZ">
<meta name="theme-color" content="#0a0c10">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Simple PTZ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  /* ── Dark theme (default) ── */
  :root {
    --bg: #0a0c10;
    --panel: #111318;
    --border: #1e2330;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #69ff74;
    --text: #c8d0e0;
    --text-dim: #4a5270;
    --btn-bg: #161b28;
    --btn-active: #0a2a3a;
    --grid-color: rgba(0,229,255,0.03);
    --shadow-accent: rgba(0,229,255,0.15);
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  /* ── Light theme ── */
  :root.light {
    --bg: #f0f2f7;
    --panel: #ffffff;
    --border: #d0d5e8;
    --accent: #0077cc;
    --accent2: #e0003a;
    --accent3: #008a10;
    --text: #1a1f30;
    --text-dim: #8892aa;
    --btn-bg: #e8ebf4;
    --btn-active: #c8d8f0;
    --grid-color: rgba(0,119,204,0.04);
    --shadow-accent: rgba(0,119,204,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.25s, color 0.25s;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo svg { height: 36px; width: auto; flex-shrink: 0; }
  .logo-wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .logo-wordmark .logo-title {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo-wordmark .logo-sub {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .header-btns { display: flex; gap: 6px; align-items: center; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 15px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .icon-btn:active { border-color: var(--accent); color: var(--accent); transform: scale(0.93); }

  /* ── Camera Selector ── */
  .cam-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cam-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 70px;
    flex: 1 1 70px;
    max-width: 120px;
  }
  .cam-btn:active { transform: scale(0.96); }
  .cam-btn.active {
    border-color: var(--accent);
    background: rgba(0,229,255,0.07);
    box-shadow: 0 0 12px var(--shadow-accent);
  }
  :root.light .cam-btn.active { background: rgba(0,119,204,0.07); }
  .cam-btn .cam-num {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--text-dim);
    line-height: 1;
  }
  .cam-btn.active .cam-num { color: var(--accent); }
  .cam-btn .cam-label {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .cam-btn.active .cam-label { color: var(--text); }
  .cam-ip {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text-dim);
  }
  .cam-btn.active .cam-ip { color: var(--accent); opacity: 0.6; }

  /* ── Main Controls Grid ── */
  .controls-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: start;
  }

  /* ── D-Pad ── */
  .dpad-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .dpad-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  /* 4-way dpad */
  .dpad {
    display: grid;
    grid-template-areas:
      ". up ."
      "left home right"
      ". down .";
    grid-template-columns: 72px 72px 72px;
    grid-template-rows: 72px 72px 72px;
    gap: 4px;
  }
  /* 8-way dpad */
  .dpad.dpad-8way {
    grid-template-areas:
      "leftup up rightup"
      "left home right"
      "leftdown down rightdown";
  }
  .dpad-btn {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    -webkit-touch-callout: none;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: var(--btn-active);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: inset 0 0 10px rgba(0,229,255,0.1);
    transform: scale(0.94);
  }
  .dpad-btn[data-dir="up"]        { grid-area: up; }
  .dpad-btn[data-dir="down"]      { grid-area: down; }
  .dpad-btn[data-dir="left"]      { grid-area: left; }
  .dpad-btn[data-dir="right"]     { grid-area: right; }
  .dpad-btn[data-dir="leftup"]    { grid-area: leftup;    font-size: 17px; color: var(--accent); opacity: 0.7; }
  .dpad-btn[data-dir="rightup"]   { grid-area: rightup;   font-size: 17px; color: var(--accent); opacity: 0.7; }
  .dpad-btn[data-dir="leftdown"]  { grid-area: leftdown;  font-size: 17px; color: var(--accent); opacity: 0.7; }
  .dpad-btn[data-dir="rightdown"] { grid-area: rightdown; font-size: 17px; color: var(--accent); opacity: 0.7; }
  .dpad-btn[data-dir="home"]      { grid-area: home; font-size: 13px; font-family: var(--mono); color: var(--text-dim); }
  .dpad-btn[data-dir="home"]:active { color: var(--accent3); border-color: var(--accent3); }
  .dpad-btn.diag:active, .dpad-btn.diag.pressed { opacity: 1; }

  /* ── Joystick ── */
  .joystick-wrap {
    position: relative;
    width: 220px; height: 220px;
    flex-shrink: 0;
  }
  .joy-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: var(--btn-bg);
    border: 1px solid var(--border);
  }
  .joy-crosshair::before, .joy-crosshair::after {
    content: '';
    position: absolute;
    background: var(--border);
  }
  .joy-crosshair::before { left: 50%; top: 10%; width: 1px; height: 80%; transform: translateX(-50%); }
  .joy-crosshair::after  { top: 50%; left: 10%; height: 1px; width: 80%; transform: translateY(-50%); }
  .joy-deadzone {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px dashed var(--border);
    pointer-events: none;
  }
  .joy-dir-label {
    position: absolute;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-dim);
    pointer-events: none;
  }
  .joy-dir-label.top    { top: 8px;    left: 50%; transform: translateX(-50%); }
  .joy-dir-label.bottom { bottom: 8px; left: 50%; transform: translateX(-50%); }
  .joy-dir-label.left   { left: 8px;   top: 50%;  transform: translateY(-50%); }
  .joy-dir-label.right  { right: 8px;  top: 50%;  transform: translateY(-50%); }
  .joy-puck {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--btn-bg);
    border: 2px solid var(--accent);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    cursor: grab;
    touch-action: none;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.1s, background 0.1s;
  }
  .joy-puck.active {
    cursor: grabbing;
    background: var(--btn-active);
  }
  .joy-puck-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    transition: transform 0.1s;
    pointer-events: none;
  }
  .joy-puck.active .joy-puck-dot { transform: scale(1.3); }
  .joy-readout {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    min-height: 14px;
    letter-spacing: 1px;
  }
  .joy-val { color: var(--accent); }

  /* ── Control mode toggle ── */
  .dpad-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-mode-toggle {
    display: flex;
    background: var(--btn-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .ctrl-mode-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 8px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .ctrl-mode-btn.active {
    background: var(--accent);
    color: var(--bg);
  }

  /* ── Zoom/Focus Strips ── */
  .strip-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .strip-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
  }
  .btn-strip { display: flex; flex-direction: column; gap: 6px; }
  .strip-btn {
    background: var(--btn-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.1s;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
  }
  .strip-btn .icon { font-size: 15px; }
  .strip-btn:active, .strip-btn.pressed {
    background: var(--btn-active);
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(0.95);
  }
  .strip-btn.zoom { border-color: rgba(255,77,109,0.3); }
  .strip-btn.zoom:active, .strip-btn.zoom.pressed { border-color: var(--accent2); color: var(--accent2); background: rgba(255,77,109,0.08); }
  .strip-btn.focus { border-color: rgba(105,255,116,0.2); }
  .strip-btn.focus:active, .strip-btn.focus.pressed { border-color: var(--accent3); color: var(--accent3); background: rgba(105,255,116,0.06); }

  /* ── Speed Panel ── */
  .speed-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .speed-panel-title {
    font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
    color: var(--text-dim); text-transform: uppercase;
  }
  .speed-row { display: flex; align-items: center; gap: 10px; }
  .speed-row label {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
    width: 28px; text-transform: uppercase;
  }
  .speed-row .val {
    font-family: var(--mono); font-size: 14px; color: var(--accent);
    width: 22px; text-align: right;
  }
  input[type=range] {
    -webkit-appearance: none; flex: 1; height: 4px;
    border-radius: 2px; background: var(--border); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--shadow-accent); cursor: pointer;
  }

  /* ── Presets ── */
  .presets-section {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .presets-header { display: flex; align-items: center; justify-content: space-between; }
  .presets-title { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .preset-mode-toggle { display: flex; gap: 4px; }
  .mode-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-family: var(--mono); font-size: 9px;
    letter-spacing: 1px; padding: 4px 8px; cursor: pointer;
    text-transform: uppercase; transition: all 0.15s;
  }
  .mode-btn.active { border-color: var(--accent3); color: var(--accent3); background: rgba(105,255,116,0.06); }
  .presets-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .preset-btn {
    background: var(--btn-bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-dim); font-family: var(--mono);
    font-size: 14px; padding: 10px 4px; cursor: pointer;
    text-align: center; transition: all 0.15s;
  }
  .preset-btn:active { transform: scale(0.93); background: var(--btn-active); border-color: var(--accent3); color: var(--accent3); }
  .preset-btn.set-mode:active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,77,109,0.08); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px;
    font-family: var(--mono); font-size: 11px; color: var(--text);
    letter-spacing: 1px; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok  { border-color: var(--accent3); color: var(--accent3); }
  #toast.err { border-color: var(--accent2); color: var(--accent2); }

  /* ── Settings Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; width: 100%; max-width: 540px;
    display: flex; flex-direction: column; gap: 12px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

  .cfg-headers {
    display: grid;
    grid-template-columns: 22px 1fr 1fr 1fr 28px;
    gap: 6px;
  }
  .cfg-headers span { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }

  .cam-config-row {
    display: grid;
    grid-template-columns: 22px 1fr 1fr 1fr 28px;
    gap: 6px;
    align-items: center;
  }
  .cam-config-row .row-num { font-family: var(--mono); font-size: 13px; color: var(--text-dim); text-align: center; }
  .cfg-input {
    background: var(--btn-bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--mono);
    font-size: 11px; padding: 8px; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  .cfg-input:focus { border-color: var(--accent); }
  .cfg-input::placeholder { color: var(--text-dim); }

  .del-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-dim); font-size: 13px;
    width: 28px; height: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; padding: 0; flex-shrink: 0;
  }
  .del-btn:active { border-color: var(--accent2); color: var(--accent2); }

  /* Camera count controls */
  .cam-count-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0 4px; border-top: 1px solid var(--border);
  }
  .cam-count-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; flex: 1; }
  .count-btn {
    background: var(--btn-bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--mono);
    font-size: 18px; width: 34px; height: 34px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .count-btn:active { border-color: var(--accent); color: var(--accent); transform: scale(0.93); }
  .count-btn:disabled { opacity: 0.3; pointer-events: none; }
  .count-display { font-family: var(--mono); font-size: 20px; color: var(--accent); min-width: 28px; text-align: center; }

  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    padding-top: 8px; border-top: 1px solid var(--border);
  }
  .modal-btn {
    background: var(--btn-bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--sans);
    font-weight: 600; font-size: 13px; letter-spacing: 1px;
    padding: 10px 18px; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
  }
  .modal-btn.primary { border-color: var(--accent); color: var(--accent); background: rgba(0,100,180,0.06); }
  .modal-btn:active { transform: scale(0.97); }

  @media (max-width: 520px) {
    .dpad { grid-template-columns: 64px 64px 64px; grid-template-rows: 64px 64px 64px; }
    .cfg-headers { grid-template-columns: 20px 1fr 1fr 28px; }
    .cfg-headers .creds-hdr { display: none; }
    .cam-config-row { grid-template-columns: 20px 1fr 1fr 28px; }
    .cam-config-row .creds-input { display: none; }
  }

  /* ── PWA install banner ── */
  #install-banner {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 12px 16px 16px;
    max-width: 320px;
    width: calc(100% - 32px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    animation: bannerIn 0.3s ease;
  }
  #install-banner.visible { display: block; }
  @keyframes bannerIn {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .banner-row {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .banner-icon {
    font-size: 28px; flex-shrink: 0; line-height: 1;
  }
  .banner-text {
    flex: 1;
  }
  .banner-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .banner-body {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
  }
  .banner-body strong {
    color: var(--accent);
    font-weight: 600;
  }
  .banner-arrow {
    text-align: center;
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 1px;
  }
  .banner-arrow span {
    font-size: 18px;

    cursor: pointer;
    padding: 2px 4px;

</style>

<body>

<div class="app">

<script>
// ── State ──────────────────────────────────────────────────────────
const DEFAULT_CAMS = [
  { name: 'CAM 1', ip: '192.168.100.51', user: 'admin', pass: 'admin' },
  { name: 'CAM 2', ip: '192.168.100.52', user: 'admin', pass: 'admin' },
  { name: 'CAM 3', ip: '192.168.100.53', user: 'admin', pass: 'admin' },
  { name: 'CAM 4', ip: '192.168.100.54', user: 'admin', pass: 'admin' },
];

let cameras     = loadCameras();
let selectedCam = 0;
let presetMode  = 'call';
let draftCameras = [];
const NUM_PRESETS = 12;

// ── Persistence ────────────────────────────────────────────────────
function loadCameras() {
  try { const s = localStorage.getItem('ptz_cameras'); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_CAMS));
}
function saveCameras() {
  try { localStorage.setItem('ptz_cameras', JSON.stringify(cameras)); } catch(e) {}
}

// ── Theme ──────────────────────────────────────────────────────────
function loadTheme() {
  applyTheme(localStorage.getItem('ptz_theme') || 'dark', false);
}
function applyTheme(theme, save=true) {
  document.documentElement.classList.toggle('light', theme === 'light');
  document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙' : '☀';
  if (save) localStorage.setItem('ptz_theme', theme);
}
function toggleTheme() {
  applyTheme(document.documentElement.classList.contains('light') ? 'dark' : 'light');
}

// ── Camera selector ────────────────────────────────────────────────
function renderCamSelector() {
  const el = document.getElementById('camSelector');
  el.innerHTML = '';
  if (selectedCam >= cameras.length) selectedCam = 0;
  cameras.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'cam-btn' + (i === selectedCam ? ' active' : '');
    btn.innerHTML = `
      <div class="cam-num">${i+1}</div>
      <div class="cam-label">${esc(c.name)}</div>
      <div class="cam-ip">${esc(c.ip)}</div>
    `;
    btn.onclick = () => { selectedCam = i; renderCamSelector(); };
    el.appendChild(btn);
  });
}

// ── Presets ────────────────────────────────────────────────────────
function renderPresets() {
  const grid = document.getElementById('presetsGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= NUM_PRESETS; i++) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (presetMode === 'set' ? ' set-mode' : '');
    btn.textContent = i;
    btn.onclick = () => handlePreset(i);
    grid.appendChild(btn);
  }
}
function setPresetMode(mode) {
  presetMode = mode;
  document.getElementById('modeBtnCall').classList.toggle('active', mode === 'call');
  document.getElementById('modeBtnSet').classList.toggle('active', mode === 'set');
  renderPresets();
}
function handlePreset(num) {
  sendPTZ(`/cgi-bin/ptzctrl.cgi?ptzcmd&${presetMode === 'call' ? 'poscall' : 'posset'}&${num}`);
  showToast(presetMode === 'set' ? `Preset ${num} saved` : `Preset ${num}`, 'ok');
}

// ── HTTP CGI ───────────────────────────────────────────────────────
function sendPTZ(path) {
  const c = cameras[selectedCam];
  if (!c || !c.ip) { showToast('No camera IP', 'err'); return; }
  fetch(`http://${c.ip}${path}`, {
    credentials: 'include',
    headers: { 'Authorization': 'Basic ' + btoa(`${c.user}:${c.pass}`) },
    mode: 'no-cors',
  }).catch(() => {});
}
function sendHome() { sendPTZ('/cgi-bin/ptzctrl.cgi?ptzcmd&home'); showToast('Home', 'ok'); }

// ── Control mode (4way / 8way / joy) ──────────────────────────────
let ctrlMode = 'dpad4';

function loadCtrlMode() {
  setCtrlMode(localStorage.getItem('ptz_ctrl_mode') || 'dpad4', false);
}

function setCtrlMode(mode, save=true) {
  ctrlMode = mode;
  document.getElementById('ctrl-dpad4').style.display = mode === 'dpad4' ? 'grid'  : 'none';
  document.getElementById('ctrl-dpad8').style.display = mode === 'dpad8' ? 'grid'  : 'none';
  document.getElementById('ctrl-joy').style.display   = mode === 'joy'   ? 'flex'  : 'none';
  document.getElementById('ctrlBtn4').classList.toggle('active',   mode === 'dpad4');
  document.getElementById('ctrlBtn8').classList.toggle('active',   mode === 'dpad8');
  document.getElementById('ctrlBtnJoy').classList.toggle('active', mode === 'joy');
  if (save) localStorage.setItem('ptz_ctrl_mode', mode);
  // Rebind move buttons whenever mode changes
  bindMoveButtons();
}

// ── Move buttons ───────────────────────────────────────────────────
const getPan  = () => document.getElementById('panSpeed').value;
const getTilt = () => document.getElementById('tiltSpeed').value;
const getZoom = () => document.getElementById('zoomSpeed').value;

function startMove(btn) {
  btn.classList.add('pressed');
  const a = btn.dataset.cmdStart, t = btn.dataset.type;
  if      (t === 'zoom')  sendPTZ(`/cgi-bin/ptzctrl.cgi?ptzcmd&${a}&${getZoom()}`);
  else if (t === 'focus') sendPTZ(`/cgi-bin/ptzctrl.cgi?ptzcmd&${a}&${getZoom()}`);
  else                    sendPTZ(`/cgi-bin/ptzctrl.cgi?ptzcmd&${a}&${getPan()}&${getTilt()}`);
}
function stopMove(btn) {
  btn.classList.remove('pressed');
  if (!btn.dataset.cmdStop) return;
  if      (btn.dataset.type === 'zoom')  sendPTZ('/cgi-bin/ptzctrl.cgi?ptzcmd&zoomstop');
  else if (btn.dataset.type === 'focus') sendPTZ('/cgi-bin/ptzctrl.cgi?ptzcmd&focusstop');
  else                                   sendPTZ('/cgi-bin/ptzctrl.cgi?ptzcmd&ptzstop&0&0');
}

function bindMoveButtons() {
  // Unbind all existing listeners by replacing nodes (simplest safe approach)
  document.querySelectorAll('[data-cmd-start]').forEach(btn => {
    const clone = btn.cloneNode(true);
    btn.parentNode.replaceChild(clone, btn);
  });
  // Bind fresh
  document.querySelectorAll('[data-cmd-start]').forEach(btn => {
    ['touchstart','mousedown'].forEach(ev =>
      btn.addEventListener(ev, e => { e.preventDefault(); startMove(btn); }));
    ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev =>
      btn.addEventListener(ev, e => { e.preventDefault(); stopMove(btn); }));
  });
}

// ── Joystick ───────────────────────────────────────────────────────
(function initJoystick() {
  const JOY_R   = 110;  // radius of ring (half of 220px)
  const DEAD    = 18;   // deadzone radius
  const PUCK_R  = 28;   // half puck width
  const MAX_R   = JOY_R - PUCK_R;
  const INTERVAL = 80; // ms between repeat commands while held

  let dragging = false;
  let joyInterval = null;
  let lastPanCmd = 0, lastTiltCmd = 0;

  function getJoyEl()     { return document.getElementById('joystick'); }
  function getPuckEl()    { return document.getElementById('joyPuck'); }
  function getReadoutEl() { return document.getElementById('joyReadout'); }

  function joyXY(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }

  function applyPuck(cx, cy) {
    const joy = getJoyEl();
    if (!joy) return;
    const rect = joy.getBoundingClientRect();
    const dx = cx - (rect.left + JOY_R);
    const dy = cy - (rect.top  + JOY_R);
    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);
    const clamped = Math.min(dist, MAX_R);
    const px = Math.cos(angle) * clamped;
    const py = Math.sin(angle) * clamped;

    const puck = getPuckEl();
    puck.style.left = (JOY_R + px) + 'px';
    puck.style.top  = (JOY_R + py) + 'px';

    if (dist < DEAD) {
      lastPanCmd = 0; lastTiltCmd = 0;
      getReadoutEl().innerHTML = 'centered';
      return;
    }

    // Map to pan/tilt speeds using speed slider maxes
    const ratio = clamped / MAX_R;
    const panMax  = parseInt(getPan());
    const tiltMax = parseInt(getTilt());
    // dx positive = right, dy positive = down
    lastPanCmd  = Math.round(Math.cos(angle) * panMax  * ratio);
    lastTiltCmd = Math.round(Math.sin(angle) * tiltMax * ratio);

    const pct = Math.round(ratio * 100);
    const deg = Math.round(((angle * 180 / Math.PI) + 360) % 360);
    const dirs = ['R','↗','U','↖','L','↙','D','↘'];
    const dLabel = dirs[Math.round(deg / 45) % 8];
    getReadoutEl().innerHTML = `<span class="joy-val">${dLabel}</span> ${pct}%`;
  }

  function sendJoyCmd() {
    if (lastPanCmd === 0 && lastTiltCmd === 0) return;
    // Build ABS-direction command using pan/tilt signs
    // Use REL move with signed speeds: positive pan = right, positive tilt = down
    const panAbs  = Math.abs(lastPanCmd);
    const tiltAbs = Math.abs(lastTiltCmd);
    // Determine cardinal/diagonal from signs
    const h = lastPanCmd  > 0 ? 'right' : lastPanCmd  < 0 ? 'left' : '';
    const v = lastTiltCmd > 0 ? 'down'  : lastTiltCmd < 0 ? 'up'   : '';
    let action = '';
    if      (h && v) action = v + (h === 'right' ? 'right' : 'left'); // e.g. "downright" — but API uses "rightdown"
    else if (h)      action = h;
    else if (v)      action = v;
    // SMTAV API diagonal format: leftup, rightup, leftdown, rightdown
    // Normalise: always [left|right][up|down]
    if (h && v) action = h + v;
    sendPTZ(`/cgi-bin/ptzctrl.cgi?ptzcmd&${action}&${panAbs || 1}&${tiltAbs || 1}`);
  }

  function startJoy(e) {
    const puck = getPuckEl();
    if (!puck) return;
    dragging = true;
    puck.classList.add('active');
    applyPuck(joyXY(e).x, joyXY(e).y);
    joyInterval = setInterval(sendJoyCmd, INTERVAL);
    e.preventDefault();
  }

  function moveJoy(e) {
    if (!dragging) return;
    applyPuck(joyXY(e).x, joyXY(e).y);
    e.preventDefault();
  }

  function endJoy() {
    if (!dragging) return;
    dragging = false;
    clearInterval(joyInterval);
    joyInterval = null;
    lastPanCmd = 0; lastTiltCmd = 0;
    sendPTZ('/cgi-bin/ptzctrl.cgi?ptzcmd&ptzstop&0&0');
    const puck = getPuckEl();
    if (puck) {
      puck.classList.remove('active');
      puck.style.left = JOY_R + 'px';
      puck.style.top  = JOY_R + 'px';
    }
    const ro = getReadoutEl();
    if (ro) ro.innerHTML = 'drag to move';
  }

  // Attach to document so drag works outside the puck
  document.addEventListener('mouseup',     endJoy);
  document.addEventListener('touchend',    endJoy);
  document.addEventListener('touchcancel', endJoy);
  document.addEventListener('mousemove',   moveJoy);
  document.addEventListener('touchmove',   moveJoy, { passive: false });

  // Puck listeners attached after DOM ready (called from init)
  window._bindJoyPuck = function() {
    const puck = getPuckEl();
    if (!puck) return;
    puck.addEventListener('mousedown',  startJoy);
    puck.addEventListener('touchstart', startJoy, { passive: false });
  };
})();

// ── Toast ──────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 1800);
}

// ── Settings modal ─────────────────────────────────────────────────
function openSettings() {
  draftCameras = JSON.parse(JSON.stringify(cameras));
  renderConfigRows();
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function renderConfigRows() {
  const rows = document.getElementById('camConfigRows');
  rows.innerHTML = '';
  document.getElementById('camCountDisplay').textContent = draftCameras.length;
  document.getElementById('removeCamBtn').disabled = draftCameras.length <= 1;

  draftCameras.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'cam-config-row';
    row.dataset.idx = i;
    row.innerHTML = `
      <span class="row-num">${i+1}</span>
      <input class="cfg-input" placeholder="CAM ${i+1}"          value="${esc(c.name)}"              data-field="name">
      <input class="cfg-input" placeholder="192.168.100.5${i+1}" value="${esc(c.ip)}"                data-field="ip">
      <input class="cfg-input creds-input" placeholder="admin:admin" value="${esc(c.user)}:${esc(c.pass)}" data-field="creds">
      <button class="del-btn" data-delidx="${i}" title="Remove camera">✕</button>
    `;
    rows.appendChild(row);
  });

  // Attach delete listeners after render
  rows.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      flushDraft();
      draftCameras.splice(parseInt(btn.dataset.delidx), 1);
      renderConfigRows();
    });
  });
}

function flushDraft() {
  document.querySelectorAll('.cam-config-row').forEach(row => {
    const i = parseInt(row.dataset.idx);
    if (isNaN(i) || i >= draftCameras.length) return;
    row.querySelectorAll('[data-field]').forEach(inp => {
      const f = inp.dataset.field;
      if (f === 'name')  draftCameras[i].name = inp.value.trim() || `CAM ${i+1}`;
      if (f === 'ip')    draftCameras[i].ip   = inp.value.trim();
      if (f === 'creds') {
        const [u, ...pp] = inp.value.split(':');
        draftCameras[i].user = u.trim() || 'admin';
        draftCameras[i].pass = pp.join(':').trim() || 'admin';
      }
    });
  });
}

function addCam() {
  flushDraft();
  const n = draftCameras.length + 1;
  draftCameras.push({ name: `CAM ${n}`, ip: '', user: 'admin', pass: 'admin' });
  renderConfigRows();
}

function removeCam() {
  if (draftCameras.length <= 1) return;
  flushDraft();
  draftCameras.pop();
  renderConfigRows();
}

function saveSettings() {
  flushDraft();
  cameras = draftCameras;
  if (selectedCam >= cameras.length) selectedCam = cameras.length - 1;
  saveCameras();
  renderCamSelector();
  closeSettings();
  showToast('Settings saved', 'ok');
}

document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

<!-- PWA Install Banner (iOS only, shown once) -->
<div id="install-banner">
  <button class="banner-dismiss" onclick="dismissBanner()" title="Dismiss">✕</button>
  <div class="banner-row">
    <div class="banner-icon">🍩</div>
    <div class="banner-text">
      <div class="banner-title">Install as App</div>
      <div class="banner-body">Add <strong>Simple PTZ</strong> to your Home Screen to keep it running offline and prevent Safari from unloading it.</div>
    </div>
  </div>
  <div class="banner-arrow">Tap <span>⎋</span> Share, then <strong>Add to Home Screen</strong></div>
</div>

<script>
// ── Util ───────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ───────────────────────────────────────────────────────────
loadTheme();
loadCtrlMode();
renderCamSelector();
renderPresets();
window._bindJoyPuck();

// ── PWA install banner ─────────────────────────────────────────────
(function() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = ('standalone' in navigator) && navigator.standalone;
  const dismissed = localStorage.getItem('ptz_banner_dismissed');
  if (isIOS && !isStandalone && !dismissed) {
    setTimeout(() => {
      document.getElementById('install-banner').classList.add('visible');
    }, 2000);
  }
})();

function dismissBanner() {
  document.getElementById('install-banner').classList.remove('visible');
  localStorage.setItem('ptz_banner_dismissed', '1');
}

// ── Service Worker registration ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
